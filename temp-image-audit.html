<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporary Image Audit</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #111827;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 30px;
        }

        .note {
            margin: 0 0 18px 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 12px;
            margin-bottom: 18px;
        }

        .toolbar input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 15px;
            background: #fff;
        }

        .toolbar button {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .summary {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
            color: var(--muted);
        }

        .section {
            margin-bottom: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 10px;
        }

        h2 {
            margin: 0;
            font-size: 22px;
        }

        .count {
            color: var(--muted);
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .item {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
        }

        .thumb-wrap {
            background: #f3f4f6;
            height: 145px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
        }

        .thumb {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        .meta {
            padding: 10px;
            border-top: 1px solid var(--border);
        }

        .name {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .path {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Temporary Image Audit</h1>
        <p class="note">
            Temporary internal page for image swaps. This lists local assets from the website image library and separates those currently referenced in source files from those not referenced.
        </p>

        <div class="toolbar">
            <input id="search" type="text" placeholder="Filter by filename or path (e.g. DSC_9104, blog, Tax.png)">
            <button id="refresh">Reload Data</button>
            <button id="clear">Clear</button>
        </div>

        <div class="summary" id="summary"></div>

        <section class="section">
            <div class="section-head">
                <h2>Currently Used Images</h2>
                <span class="count" id="used-count"></span>
            </div>
            <div class="grid" id="used-grid"></div>
        </section>

        <section class="section">
            <div class="section-head">
                <h2>Not Currently Used Images</h2>
                <span class="count" id="unused-count"></span>
            </div>
            <div class="grid" id="unused-grid"></div>
        </section>
    </div>

    <script type="module">
        const summaryEl = document.getElementById('summary');
        const usedGrid = document.getElementById('used-grid');
        const unusedGrid = document.getElementById('unused-grid');
        const usedCount = document.getElementById('used-count');
        const unusedCount = document.getElementById('unused-count');
        const searchInput = document.getElementById('search');
        const clearBtn = document.getElementById('clear');
        const refreshBtn = document.getElementById('refresh');

        function makeCard(imgPath) {
            const fileName = imgPath.split('/').pop();
            const card = document.createElement('article');
            card.className = 'item';
            card.dataset.path = imgPath.toLowerCase();
            card.dataset.name = fileName.toLowerCase();

            const safePath = encodeURI(imgPath);
            card.innerHTML = `
                <div class="thumb-wrap">
                    <img class="thumb" src="${safePath}" alt="${fileName}" loading="lazy">
                </div>
                <div class="meta">
                    <div class="name">${fileName}</div>
                    <div class="path">${imgPath}</div>
                </div>
            `;
            return card;
        }
        
        let usedCards = [];
        let unusedCards = [];

        function applyFilter() {
            const q = searchInput.value.trim().toLowerCase();
            let usedVisible = 0;
            let unusedVisible = 0;

            usedCards.forEach(card => {
                const show = !q || card.dataset.path.includes(q) || card.dataset.name.includes(q);
                card.style.display = show ? '' : 'none';
                if (show) usedVisible += 1;
            });

            unusedCards.forEach(card => {
                const show = !q || card.dataset.path.includes(q) || card.dataset.name.includes(q);
                card.style.display = show ? '' : 'none';
                if (show) unusedVisible += 1;
            });

            usedCount.textContent = `${usedVisible} shown`;
            unusedCount.textContent = `${unusedVisible} shown`;
        }

        async function loadAuditData() {
            const stamp = Date.now();
            const res = await fetch(`/temp-image-audit-data.json?t=${stamp}`, { cache: 'no-store' });
            const data = await res.json();

            summaryEl.innerHTML = `
                <strong>Total local images:</strong> ${data.allCount}
                <strong>Used:</strong> ${data.usedCount}
                <strong>Unused:</strong> ${data.unusedCount}
                <strong>Loaded:</strong> ${new Date().toLocaleTimeString()}
            `;

            usedGrid.innerHTML = '';
            unusedGrid.innerHTML = '';
            usedCards = data.used.map(makeCard);
            unusedCards = data.unused.map(makeCard);
            usedCards.forEach(card => usedGrid.appendChild(card));
            unusedCards.forEach(card => unusedGrid.appendChild(card));
            applyFilter();
        }

        searchInput.addEventListener('input', applyFilter);
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            applyFilter();
            searchInput.focus();
        });
        refreshBtn.addEventListener('click', loadAuditData);

        await loadAuditData();
    </script>
</body>
</html>
